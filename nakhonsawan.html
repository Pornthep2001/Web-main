<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พื้นที่ให้บริการทุกตำบล นครสวรรค์ 2026 - ศิวกรแอร์</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-dark: #020817;
            --accent-blue: #00eaff;
            --win-blue: #0973ff;
            --glass-bg: rgba(15, 23, 42, 0.9);
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--primary-dark); color: var(--white); overflow-x: hidden; padding-top: 70px; }
        h1, h2, h3, .nav-logo { font-family: 'Chakra Petch', sans-serif; }

        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; background: rgba(1, 23, 43, 0.95);
            height: 70px; width: 100%; position: fixed; top: 0; z-index: 2000;
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-logo { color: white; text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; }
        .nav-logo img { height: 40px; }

        .dashboard-container {
            display: grid; 
            grid-template-columns: 1fr 0.8fr;
            gap: 20px; padding: 20px 5%; 
            max-width: 1600px; margin: 0 auto;
        }

        .map-card {
            background: var(--glass-bg); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; position: relative; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .svg-map { width: 100%; height: auto; }

        /* ปรับแต่งส่วนที่คลิกได้ในแผนที่ */
        .district-poly {
            fill: #1e293b; stroke: rgba(255,255,255,0.2);
            stroke-width: 1; transition: var(--transition);
            cursor: pointer;
        }

        .district-poly:hover, .district-poly.selected {
            fill: var(--win-blue) !important;
            stroke: var(--accent-blue);
            stroke-width: 2;
            filter: drop-shadow(0 0 10px var(--accent-blue));
        }

        .map-label {
            font-family: 'Chakra Petch'; font-size: 11px;
            fill: rgba(255,255,255,0.6); font-weight: 600;
            pointer-events: none;
        }

        .side-panel { display: flex; flex-direction: column; gap: 20px; }

        .district-list-wrapper {
            background: var(--glass-bg); border-radius: 25px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.1); 
            max-height: 450px; overflow-y: auto;
        }

        .district-item-btn {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 15px; border-radius: 12px; cursor: pointer;
            margin-bottom: 8px; transition: var(--transition); color: white;
            font-size: 14px;
        }

        .district-item-btn:hover, .district-item-btn.active-btn {
            background: var(--win-blue); transform: translateX(5px);
        }

        .sub-district-panel {
            background: rgba(0, 234, 255, 0.05);
            border-radius: 25px; padding: 20px;
            border: 1px solid var(--accent-blue);
            min-height: 300px;
        }

        .town-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px; margin-top: 15px;
        }

        .town-link {
            text-decoration: none; background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 10px; font-size: 13px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            color: var(--white); display: flex; flex-direction: column;
            transition: 0.3s; animation: fadeIn 0.4s ease forwards;
        }

        .town-link:hover {
            background: var(--accent-blue); color: var(--primary-dark);
            transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 234, 255, 0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 992px) {
            .dashboard-container { grid-template-columns: 1fr; }
            .nav-logo span { display: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="IM/Adobe Express 2026-03-13 16.31.52.png" alt="Logo">
            <span>ศิวกรแอร์ เซอร์วิส</span>
        </a>
        <div style="font-size: 12px; color: var(--accent-blue); font-weight: bold;">
            LIVE DASHBOARD: 15 อำเภอ
        </div>
    </nav>

    <div class="dashboard-container">
        
        <section class="map-section">
            <div class="map-card">
                <h3 style="color: var(--accent-blue); margin-bottom: 10px;"><i class="fas fa-mouse-pointer"></i> คลิกที่พื้นที่ในแผนที่ได้ทันที</h3>
                
                <svg class="svg-map" viewBox="0 0 800 600">
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('banphot')">
                        <path id="poly-banphot" class="district-poly" d="M300,50 L450,40 L500,120 L400,180 L280,180 Z" />
                        <text x="340" y="110" class="map-label">บรรพตพิสัย</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('mueang')">
                        <path id="poly-mueang" class="district-poly" d="M400,180 L550,180 L600,300 L450,350 L350,280 Z" />
                        <text x="440" y="260" class="map-label">เมืองฯ</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('kaoliao')">
                        <path id="poly-kaoliao" class="district-poly" d="M420,130 L500,120 L550,180 L400,180 Z" />
                        <text x="450" y="160" class="map-label" style="font-size:9px;">เก้าเลี้ยว</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('latyao')">
                        <path id="poly-latyao" class="district-poly" d="M150,180 L280,180 L350,280 L250,350 L100,300 Z" />
                        <text x="210" y="260" class="map-label">ลาดยาว</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('chumsaeng')">
                        <path id="poly-chumsaeng" class="district-poly" d="M500,40 L650,60 L700,150 L550,180 L500,120 Z" />
                        <text x="570" y="100" class="map-label">ชุมแสง</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('takhli')">
                        <path id="poly-takhli" class="district-poly" d="M500,380 L700,350 L750,550 L550,580 Z" />
                        <text x="600" y="480" class="map-label">ตาคลี</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('phayuha')">
                        <path id="poly-phayuha" class="district-poly" d="M350,350 L500,350 L550,450 L350,480 Z" />
                        <text x="410" y="420" class="map-label">พยุหะคีรี</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('tha-tako')">
                        <path id="poly-tha-tako" class="district-poly" d="M550,180 L720,180 L750,300 L600,300 Z" />
                        <text x="620" y="240" class="map-label">ท่าตะโก</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('nong-bua')">
                        <path id="poly-nong-bua" class="district-poly" d="M650,60 L780,100 L780,250 L720,180 Z" />
                        <text x="700" y="140" class="map-label">หนองบัว</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('phaisali')">
                        <path id="poly-phaisali" class="district-poly" d="M600,300 L750,300 L780,450 L700,350 Z" />
                        <text x="670" y="380" class="map-label">ไพศาลี</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('krok-phra')">
                        <path id="poly-krok-phra" class="district-poly" d="M350,280 L450,350 L350,350 L250,350 Z" />
                        <text x="330" y="330" class="map-label">โกรกพระ</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('tak-fa')">
                        <path id="poly-tak-fa" class="district-poly" d="M550,450 L780,450 L750,550 L550,580 Z" />
                        <text x="630" y="520" class="map-label">ตากฟ้า</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('mae-wong')">
                        <path id="poly-mae-wong" class="district-poly" d="M50,100 L150,180 L100,300 L20,250 Z" />
                        <text x="60" y="200" class="map-label">แม่วงก์</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('mae-poen')">
                        <path id="poly-mae-poen" class="district-poly" d="M20,250 L100,300 L50,400 L10,350 Z" />
                        <text x="30" y="320" class="map-label">แม่เปิน</text>
                    </g>
                    <g class="map-region" style="cursor:pointer" onclick="updateDisplay('chum-ta-bong')">
                        <path id="poly-chum-ta-bong" class="district-poly" d="M100,300 L250,350 L200,450 L50,400 Z" />
                        <text x="130" y="380" class="map-label">ชุมตาบง</text>
                    </g>
                </svg>
            </div>
        </section>

        <aside class="side-panel">
            <div class="district-list-wrapper">
                <p style="color: var(--accent-blue); margin-bottom: 10px; font-weight: 700;">เลือกอำเภอ</p>
                <div class="district-list" id="district-btns">
                    </div>
            </div>

            <div class="sub-district-panel">
                <h4 id="district-title" style="color: var(--accent-blue); margin-bottom: 10px;">ตำบลที่ให้บริการ</h4>
                <div class="town-grid" id="town-list"></div>
            </div>
        </aside>
    </div>

    <script>
        const nakhonSawanData = {
            "mueang": {name: "เมืองนครสวรรค์", towns: ["ปากน้ำโพ", "วัดไทร", "แควใหญ่", "ตะเคียนเลื่อน", "นครสวรรค์ตก", "นครสวรรค์ออก", "บางม่วง", "กลางแดด", "เกรียงไกร", "หนองปลิง", "หนองกรด", "หนองกระโดน", "บ้านมะเกลือ", "บ้านแก่ง", "พระนอน", "วังมหากัน"]},
            "krok-phra": {name: "โกรกพระ", towns: ["โกรกพระ", "ยางตาล", "บางมะฝ่อ", "บางประมุง", "นากลาง", "ศาลาแดง", "หาดสูง", "เนินกว้าว", "เนินศาลา"]},
            "chumsaeng": {name: "ชุมแสง", towns: ["ชุมแสง", "ทับกฤช", "ทับกฤชใต้", "พิกุล", "เกยไชย", "ท่าไม้", "บางไผ่", "หนองกระเจา", "โคกหม้อ", "ไผ่สิงห์", "ฆะมัง", "พันลาน"]},
            "nong-bua": {name: "หนองบัว", towns: ["หนองบัว", "หนองกลับ", "ธารทหาร", "ห้วยร่วม", "ห้วยถั่วใต้", "ห้วยถั่วเหนือ", "กุดตาเพชร", "วังบ่อ", "หนองลาน"]},
            "banphot": {name: "บรรพตพิสัย", towns: ["ท่างิ้ว", "บางตาหงาย", "หูกวาง", "อ่างทอง", "บ้านแดน", "บางแก้ว", "ตาขีด", "ตาสัง", "ด่านช้าง", "หนองกรด", "หนองตางู", "เจริญผล"]},
            "kaoliao": {name: "เก้าเลี้ยว", towns: ["เก้าเลี้ยว", "มหาโพธิ", "หนองเต่า", "เขาทอง", "เขาดิน"]},
            "takhli": {name: "ตาคลี", towns: ["ตาคลี", "ช่องแค", "จันเสน", "ห้วยหอม", "หนองโพ", "หนองหม้อ", "พรหมนิมิต", "ลาดทิพรส", "สร้อยทอง"]},
            "tha-tako": {name: "ท่าตะโก", towns: ["ท่าตะโก", "พนมรอก", "หัวถนน", "สายลำโพง", "วังมหากัน", "วังใหญ่", "พนมเศษ", "หนองหลวง", "ดอนคา", "ทำนบ"]},
            "phaisali": {name: "ไพศาลี", towns: ["ไพศาลี", "โคกเดื่อ", "สำโรงชัย", "วังน้ำลัด", "ตะคร้อ", "โพธิ์ประสาท", "วังข่อย", "นาขอม"]},
            "phayuha": {name: "พยุหะคีรี", towns: ["พยุหะ", "เนินมะกอก", "นิคมเขาบ่อแก้ว", "ท่าน้ำอ้อย", "ม่วงหัก", "ยางขาว", "ย่านมัทรี", "เขาทอง", "เขากะลา", "สระทะเล", "น้ำทรง"]},
            "latyao": {name: "ลาดยาว", towns: ["ลาดยาว", "ห้วยน้ำหอม", "วังม้า", "วังเมือง", "สร้อยละคร", "มาบแก", "หนองยาว", "หนองนมวัว", "บ้านไร่", "ศาลเจ้าไก่ต่อ", "สระแก้ว", "ห้วยหอม"]},
            "tak-fa": {name: "ตากฟ้า", towns: ["ตากฟ้า", "ลำพยนต์", "สุขสำราญ", "หนองพิกุล", "พุนกยูง", "อุดมธัญญา", "เขาชายธง"]},
            "mae-wong": {name: "แม่วงก์", towns: ["แม่วงก์", "แม่เลย์", "วังซ่าน", "เขาชนกัน", "ปางสวรรค์", "ห้วยน้ำหอม"]},
            "mae-poen": {name: "แม่เปิน", towns: ["แม่เปิน"]},
            "chum-ta-bong": {name: "ชุมตาบง", towns: ["ชุมตาบง", "ปางสวรรค์"]}
        };

        const districtList = document.getElementById('district-btns');
        const townList = document.getElementById('town-list');
        const districtTitle = document.getElementById('district-title');

        // สร้างปุ่มอำเภอ (ฝั่งขวา)
        Object.keys(nakhonSawanData).forEach(id => {
            const btn = document.createElement('div');
            btn.className = 'district-item-btn';
            btn.setAttribute('data-target', id);
            btn.innerHTML = `<span>อ.${nakhonSawanData[id].name}</span><i class="fas fa-chevron-right"></i>`;
            btn.onclick = () => updateDisplay(id);
            districtList.appendChild(btn);
        });

        // ฟังก์ชันหลักในการอัปเดตการแสดงผล (ใช้ได้ทั้งคลิกที่แผนที่และคลิกที่ปุ่ม)
        function updateDisplay(id) {
            // ไฮไลท์ปุ่ม
            document.querySelectorAll('.district-item-btn').forEach(b => {
                b.classList.toggle('active-btn', b.dataset.target === id);
            });

            // ไฮไลท์แผนที่
            document.querySelectorAll('.district-poly').forEach(p => {
                p.classList.toggle('selected', p.id === 'poly-' + id);
            });

            // อัปเดตรายชื่อตำบล
            const data = nakhonSawanData[id];
            if (data) {
                districtTitle.innerHTML = `<i class="fas fa-city"></i> อ.${data.name}`;
                townList.innerHTML = "";
                data.towns.forEach(town => {
                    const link = document.createElement('a');
                    link.href = `work-details.html?district=${id}&town=${town}`;
                    link.className = 'town-link';
                    link.innerHTML = `<strong>ต.${town}</strong><span style="font-size:10px; opacity:0.7">คลิกดูผลงาน</span>`;
                    townList.appendChild(link);
                });
            }
        }

        // เริ่มต้นที่ "บรรพตพิสัย" เมื่อโหลดหน้าเว็บ
        window.onload = () => updateDisplay('banphot');
    </script>
</body>
</html>
