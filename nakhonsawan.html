<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พื้นที่ให้บริการทุกตำบล นครสวรรค์ 2026 - ศิวกรแอร์</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-dark: #020817;
            --accent-blue: #00eaff;
            --win-blue: #0973ff;
            --glass-bg: rgba(15, 23, 42, 0.9);
            --white: #ffffff;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: var(--primary-dark); color: var(--white); overflow-x: hidden; padding-top: 70px; }
        h1, h2, h3, .nav-logo { font-family: 'Chakra Petch', sans-serif; }

        /* Navbar */
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; background: rgba(1, 23, 43, 0.95);
            height: 70px; width: 100%; position: fixed; top: 0; z-index: 2000;
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-logo { color: white; text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; }
        .nav-logo img { height: 40px; }

        /* Dashboard Layout */
        .dashboard-container {
            display: grid; 
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px; padding: 20px 5%; 
            max-width: 1600px; margin: 0 auto;
        }

        /* แผนที่ SVG */
        .map-card {
            background: var(--glass-bg); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; position: relative; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .svg-map { width: 100%; height: auto; filter: drop-shadow(0 0 15px rgba(0, 234, 255, 0.1)); }

        .district-poly {
            fill: #1e293b; stroke: rgba(255,255,255,0.2);
            stroke-width: 1; transition: var(--transition);
            cursor: pointer;
        }

        .district-poly:hover, .district-poly.selected {
            fill: var(--win-blue) !important;
            stroke: var(--accent-blue);
            stroke-width: 2;
            filter: drop-shadow(0 0 10px var(--accent-blue));
        }

        .map-label {
            font-family: 'Chakra Petch'; font-size: 12px;
            fill: rgba(255,255,255,0.6); font-weight: 600;
            pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* รายชื่ออำเภอ Sidebar */
        .side-panel { display: flex; flex-direction: column; gap: 20px; }

        .district-list-wrapper {
            background: var(--glass-bg); border-radius: 25px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.1); 
            max-height: 400px; overflow-y: auto;
        }

        .district-item-btn {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 15px; border-radius: 12px; cursor: pointer;
            margin-bottom: 8px; transition: var(--transition); color: white;
        }

        .district-item-btn:hover, .district-item-btn.active-btn {
            background: var(--win-blue); transform: translateX(5px);
        }

        /* แผงแสดงตำบล (Sub-district Panel) */
        .sub-district-panel {
            background: rgba(0, 234, 255, 0.05);
            border-radius: 25px; padding: 25px;
            border: 1px solid var(--accent-blue);
            min-height: 350px;
            display: flex;
            flex-direction: column;
        }

        .town-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px; margin-top: 20px;
        }

        /* ปุ่มตำบลแบบลิงก์ */
        .town-link {
            text-decoration: none;
            background: rgba(255,255,255,0.05);
            padding: 12px 10px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--white);
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease forwards;
        }

        .town-link:hover {
            background: var(--accent-blue);
            color: var(--primary-dark);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 234, 255, 0.4);
            border-color: var(--accent-blue);
        }

        .town-link i { font-size: 10px; opacity: 0.7; }
        .town-link strong { font-weight: 600; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 992px) {
            .dashboard-container { grid-template-columns: 1fr; }
            .nav-logo span { display: none; }
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="IM/Adobe Express 2026-03-13 16.31.52.png" alt="Logo">
            <span>ศิวกรแอร์ เซอร์วิส</span>
        </a>
        <div style="font-size: 12px; color: var(--accent-blue); font-weight: bold;">
            <i class="fas fa-circle" style="animation: blink 1s infinite;"></i> LIVE COVERAGE 2026
        </div>
    </nav>

    <div class="dashboard-container">
        
        <section class="map-section">
            <div class="map-card">
                <h3 style="color: var(--accent-blue); margin-bottom: 15px;"><i class="fas fa-map-marked-alt"></i> แผนที่สรุปงานแยกตำบล</h3>
                
                <svg class="svg-map" viewBox="0 0 600 500">
                    <g class="map-region" data-id="banphot"><path id="poly-banphot" class="district-poly" d="M180,50 L320,40 L360,120 L300,180 L200,190 L140,140 Z" /><text x="195" y="115" class="map-label">บรรพตพิสัย</text></g>
                    <g class="map-region" data-id="mueang"><path id="poly-mueang" class="district-poly" d="M300,180 L420,160 L480,250 L420,350 L300,380 L250,280 Z" /><text x="335" y="275" class="map-label">อ.เมือง</text></g>
                    <g class="map-region" data-id="kaoliao"><path id="poly-kaoliao" class="district-poly" d="M280,120 L360,120 L380,160 L300,180 Z" /><text x="310" y="150" class="map-label" style="font-size: 10px;">เก้าเลี้ยว</text></g>
                    <g class="map-region" data-id="latyao"><path id="poly-latyao" class="district-poly" d="M80,200 L200,190 L250,280 L180,350 L50,300 Z" /><text x="125" y="275" class="map-label">ลาดยาว</text></g>
                    <g class="map-region" data-id="chumsaeng"><path id="poly-chumsaeng" class="district-poly" d="M360,40 L480,60 L520,160 L420,160 L360,120 Z" /><text x="410" y="105" class="map-label">ชุมแสง</text></g>
                    <g class="map-region" data-id="takhli"><path id="poly-takhli" class="district-poly" d="M400,350 L550,300 L580,450 L450,480 Z" /><text x="480" y="410" class="map-label">ตาคลี</text></g>
                    <g class="map-region" data-id="phayuha"><path id="poly-phayuha" class="district-poly" d="M250,380 L400,350 L420,450 L300,480 Z" /><text x="310" y="430" class="map-label">พยุหะคีรี</text></g>
                    <g class="map-region" data-id="tha-tako"><path id="poly-tha-tako" class="district-poly" d="M420,160 L550,150 L580,250 L480,250 Z" /><text x="480" y="200" class="map-label">ท่าตะโก</text></g>
                </svg>
                
                <p style="font-size: 11px; opacity: 0.5; margin-top: 10px;">* คลิกที่แผนที่เพื่อสลับเขตอำเภอ</p>
            </div>
        </section>

        <aside class="side-panel">
            <div class="district-list-wrapper">
                <p style="color: var(--accent-blue); margin-bottom: 10px; font-weight: 700; font-size: 14px;">รายงานแยกรายอำเภอ</p>
                <div class="district-list">
                    <div class="district-item-btn" data-target="banphot"><span>อ.บรรพตพิสัย</span><i class="fas fa-chevron-right"></i></div>
                    <div class="district-item-btn" data-target="mueang"><span>อ.เมืองนครสวรรค์</span><i class="fas fa-chevron-right"></i></div>
                    <div class="district-item-btn" data-target="kaoliao"><span>อ.เก้าเลี้ยว</span><i class="fas fa-chevron-right"></i></div>
                    <div class="district-item-btn" data-target="latyao"><span>อ.ลาดยาว</span><i class="fas fa-chevron-right"></i></div>
                    <div class="district-item-btn" data-target="chumsaeng"><span>อ.ชุมแสง</span><i class="fas fa-chevron-right"></i></div>
                    <div class="district-item-btn" data-target="takhli"><span>อ.ตาคลี</span><i class="fas fa-chevron-right"></i></div>
                    <div class="district-item-btn" data-target="phayuha"><span>อ.พยุหะคีรี</span><i class="fas fa-chevron-right"></i></div>
                    <div class="district-item-btn" data-target="tha-tako"><span>อ.ท่าตะโก</span><i class="fas fa-chevron-right"></i></div>
                </div>
            </div>

            <div class="sub-district-panel" id="town-panel">
                <h4 id="district-title" style="color: var(--accent-blue); font-size: 18px;">
                    <i class="fas fa-map-marker-alt"></i> เลือกพื้นที่เพื่อดูตำบล
                </h4>
                <p style="font-size: 12px; opacity: 0.6; margin-top: 5px;">คลิกที่ชื่อตำบลเพื่อดูสรุปเคสและผลงานจริง</p>
                
                <div class="town-grid" id="town-list">
                    </div>
            </div>
        </aside>
    </div>

    <script>
        // ข้อมูลตำบล (ID ต้องตรงกับ data-target และ ID ของ Path แผนที่)
        // สังเกต: ผมเพิ่ม Case Count (ตัวเลขงาน) เป็นตัวอย่างในแต่ละตำบล
        const nakhonSawanData = {
            "banphot": [
                {name: "เจริญผล", cases: 145}, {name: "ท่างิ้ว", cases: 88}, {name: "บ้านแดน", cases: 72}, 
                {name: "บางตาหงาย", cases: 54}, {name: "หูกวาง", cases: 41}, {name: "ตาสัง", cases: 29}, 
                {name: "ด่านช้าง", cases: 33}, {name: "หนองกรด", cases: 19}, {name: "บางแก้ว", cases: 12}
            ],
            "mueang": [
                {name: "ปากน้ำโพ", cases: 210}, {name: "วัดไทร", cases: 95}, {name: "แควใหญ่", cases: 64}, 
                {name: "ตะเคียนเลื่อน", cases: 42}, {name: "นครสวรรค์ตก", cases: 88}, {name: "บางม่วง", cases: 51}, 
                {name: "หนองปลิง", cases: 76}, {name: "เกรียงไกร", cases: 24}
            ],
            "kaoliao": [
                {name: "เก้าเลี้ยว", cases: 65}, {name: "มหาโพธิ", cases: 32}, {name: "หนองเต่า", cases: 28}, 
                {name: "เขาทอง", cases: 15}, {name: "เขาดิน", cases: 19}
            ],
            "latyao": [
                {name: "ลาดยาว", cases: 74}, {name: "ห้วยน้ำหอม", cases: 21}, {name: "มาบแก", cases: 18}, 
                {name: "ศาลเจ้าไก่ต่อ", cases: 30}, {name: "สระแก้ว", cases: 25}
            ],
            "chumsaeng": [
                {name: "ชุมแสง", cases: 82}, {name: "ทับกฤช", cases: 34}, {name: "เกยไชย", cases: 22}, 
                {name: "ท่าไม้", cases: 15}, {name: "หนองกระเจา", cases: 11}
            ],
            "takhli": [
                {name: "ตาคลี", cases: 120}, {name: "ช่องแค", cases: 45}, {name: "จันเสน", cases: 31}, 
                {name: "ห้วยหอม", cases: 18}, {name: "พรหมนิมิต", cases: 22}
            ],
            "phayuha": [
                {name: "พยุหะ", cases: 54}, {name: "เนินมะกอก", cases: 29}, {name: "ท่าน้ำอ้อย", cases: 18}, 
                {name: "ยางขาว", cases: 12}, {name: "นิคมเขาบ่อแก้ว", cases: 41}
            ],
            "tha-tako": [
                {name: "ท่าตะโก", cases: 67}, {name: "พนมรอก", cases: 22}, {name: "หัวถนน", cases: 19}, 
                {name: "สายลำโพง", cases: 14}, {name: "วังมหากัน", cases: 10}
            ]
        };

        const buttons = document.querySelectorAll('.district-item-btn');
        const paths = document.querySelectorAll('.district-poly');
        const townList = document.getElementById('town-list');
        const districtTitle = document.getElementById('district-title');

        function updateDisplay(id) {
            // 1. จัดการปุ่มไฮไลท์
            buttons.forEach(b => {
                b.classList.remove('active-btn');
                if(b.getAttribute('data-target') === id) b.classList.add('active-btn');
            });

            // 2. จัดการแผนที่ไฮไลท์
            paths.forEach(p => {
                p.classList.remove('selected');
                if(p.id === 'poly-' + id) p.classList.add('selected');
            });

            // 3. แสดงรายชื่อตำบล พร้อมลิงก์
            const currentDistrictName = document.querySelector(`[data-target="${id}"] span`).innerText;
            districtTitle.innerHTML = `<i class="fas fa-city"></i> ${currentDistrictName}`;
            
            townList.innerHTML = "";
            const towns = nakhonSawanData[id] || [];
            
            towns.forEach(town => {
                const link = document.createElement('a');
                // กำหนดโครงสร้างลิงก์ เช่น work-latyao.html หรือใช้ Query String
                // ในที่นี้ผมใช้ตัวอย่างเป็น work-details.html?town=ชื่อตำบล
                link.href = `work-details.html?district=${id}&town=${town.name}`; 
                link.className = 'town-link';
                
                link.innerHTML = `
                    <strong>ต.${town.name}</strong>
                    <span><i class="fas fa-check-circle"></i> ${town.cases} เคส</span>
                `;
                townList.appendChild(link);
            });
        }

        // เพิ่ม Event Listeners
        buttons.forEach(btn => {
            btn.addEventListener('click', () => updateDisplay(btn.getAttribute('data-target')));
        });

        paths.forEach(path => {
            path.addEventListener('click', () => updateDisplay(path.id.replace('poly-', '')));
        });

        // เริ่มต้นหน้าเว็บที่ "บรรพตพิสัย"
        window.onload = () => updateDisplay('banphot');
    </script>

</body>
</html>
